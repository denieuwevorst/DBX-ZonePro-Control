<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#19191b">
<title>ZonePRO &middot; Zone Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="link-status" id="linkStatus">
  <span class="led" id="linkLed"></span>
  <span class="link-label" id="linkLabel">CONNECTING&hellip;</span>
</div>

<main class="rack" id="rack">
  <!-- channel strips injected by app.js -->
</main>

<template id="strip-template">
  <section class="strip" data-zone>
    <div class="strip-head">
      <h2 class="strip-name" data-name></h2>
      <a class="solo-link" data-link href="#" hidden title="Open this zone alone" aria-label="Open this zone alone">&#8599;</a>
    </div>

    <div class="source-row">
      <label class="source-label" data-input-label>SRC</label>
      <select class="source-select" data-input></select>
    </div>

    <div class="fader-column">
      <div class="scale" aria-hidden="true" data-scale>
        <span class="tick tick-top" data-tick-top>+20</span>
        <span class="tick tick-unity" data-tick-unity>0</span>
        <span class="tick tick-bottom" data-tick-bottom>&minus;90</span>
      </div>
      <div class="fader-track" data-track>
        <div class="unity-mark" data-unity title="Unity gain (0dB)"></div>
        <div class="fader-thumb" data-thumb tabindex="0" role="slider" aria-orientation="vertical"></div>
      </div>
    </div>

    <div class="readout" data-readout>0.0 dB</div>

    <button class="mute-btn" data-mute type="button">
      <span class="mute-led" data-mute-led></span>
      MUTE
    </button>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
